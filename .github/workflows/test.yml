# 工作流名称
name: 自动测试

# 触发条件：推送代码或提PR时触发
on: [push, pull_request]

# 定义任务
jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 下载你的代码
    - uses: actions/checkout@v4
    
    # 2. 安装 Python
    - name: 安装 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    # 3. 安装依赖
    - name: 安装依赖
      run: |
        pip install -r requirements.txt
        pip install pytest
    
    # 4. 运行测试
    - name: 运行测试
      run: pytest test_example.py -v